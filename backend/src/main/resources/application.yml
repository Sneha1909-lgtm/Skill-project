server:
  port: ${PORT:8080}

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driverClassName: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

app:
  security:
    jwt:
      secret: ${JWT_SECRET}
      expiration: 86400000

logging:
  level:
    com.apexglobal.erp: INFO
    org.springframework.security: WARN
